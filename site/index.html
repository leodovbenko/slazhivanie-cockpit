-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6b2f61e5-39c6-4b2f-8288-8d02dbb6a78f\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"37fd917f-b579-43d8-a1fb-4a172b9f629e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"79bf0380-ddd2-4003-8db1-9d436cae4f35\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"3f60edf7-c045-41fb-84b2-6dd7650a05f7\"><\u002Fscript>\n\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{font-family:'IBM Plex Sans',system-ui,-apple-system,'Segoe UI',sans-serif;color:#202526;background:#F3F7FA;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}\n  ::selection{background:#C7F2E2;color:#0E5A3F;}\n  button{font-family:inherit;}\n  input,textarea{font-family:inherit;}\n  @keyframes scFade{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent: {{ accent }}; min-height:100vh; background:#F3F7FA; color:#202526; overflow-x:hidden;\">\n\n  <!-- ===================== HEADER / NAV ===================== -->\n  <header style=\"position:sticky; top:0; z-index:60; background:rgba(255,255,255,0.9); backdrop-filter:saturate(1.4) blur(10px); border-bottom:1px solid #E2E9EE;\">\n    <div style=\"max-width:1200px; margin:0 auto; padding:0 24px; height:68px; display:flex; align-items:center; justify-content:space-between; gap:24px;\">\n      <button onclick=\"{{ goHome }}\" style=\"display:inline-flex; align-items:center; gap:11px; background:none; border:none; cursor:pointer; padding:0; flex:none;\">\n        <svg width=\"34\" height=\"34\" viewBox=\"0 0 34 34\" fill=\"none\" style=\"flex:none;\">\n          <rect width=\"34\" height=\"34\" rx=\"9\" fill=\"var(--accent,#17C787)\"><\u002Frect>\n          <path d=\"M8 11.5 C 14 6.5, 20 6.5, 26 11.5\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M8 22.5 C 14 27.5, 20 27.5, 26 22.5\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\"><\u002Fpath>\n          <circle cx=\"17\" cy=\"17\" r=\"3.4\" fill=\"#fff\"><\u002Fcircle>\n        <\u002Fsvg>\n        <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:21px; letter-spacing:-0.02em; color:#18191B; line-height:1;\">слаживание<span style=\"color:var(--accent,#17C787);\">.<\u002Fspan><\u002Fspan>\n      <\u002Fbutton>\n\n      <nav style=\"display:flex; align-items:center; gap:6px;\">\n        <sc-for list=\"{{ nav }}\" as=\"n\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ n.go }}\" style=\"background:none; border:none; cursor:pointer; padding:9px 13px; border-radius:8px; font-size:14.5px; font-weight:500; color:#5C6A75; display:inline-flex; align-items:center; gap:7px; transition:color .15s ease, background .15s ease;\" style-hover=\"color:#18191B; background:#F3F7FA;\">\n            <sc-if value=\"{{ n.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:6px; height:6px; border-radius:999px; background:var(--accent,#17C787); flex:none;\"><\u002Fspan><\u002Fsc-if>\n            {{ n.label }}\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fnav>\n\n      <button onclick=\"{{ goContacts }}\" style=\"flex:none; display:inline-flex; align-items:center; gap:8px; height:42px; padding:0 18px; border-radius:8px; border:1px solid transparent; background:var(--accent,#17C787); color:#fff; font-size:14.5px; font-weight:600; cursor:pointer; transition:background .15s ease;\" style-hover=\"background:#13B07A;\">Обсудить внедрение<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main>\n  <!-- ============================================================= -->\n  <!-- ===================== HOME ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- HERO -->\n    <section style=\"position:relative; background:#18191B; color:#fff; overflow:hidden;\">\n      <svg viewBox=\"0 0 600 600\" width=\"620\" height=\"620\" fill=\"none\" style=\"position:absolute; top:-120px; right:-130px; opacity:0.16; pointer-events:none;\">\n        <g stroke=\"var(--accent,#17C787)\" stroke-width=\"2\" fill=\"none\">\n          <path d=\"M120 240 C 240 110, 360 110, 480 240\"><\u002Fpath>\n          <path d=\"M150 270 C 250 165, 350 165, 450 270\"><\u002Fpath>\n          <path d=\"M180 300 C 258 218, 342 218, 420 300\"><\u002Fpath>\n          <path d=\"M120 360 C 240 490, 360 490, 480 360\"><\u002Fpath>\n          <path d=\"M150 330 C 250 435, 350 435, 450 330\"><\u002Fpath>\n          <path d=\"M180 300 C 258 382, 342 382, 420 300\"><\u002Fpath>\n        <\u002Fg>\n        <circle cx=\"300\" cy=\"300\" r=\"9\" fill=\"var(--accent,#17C787)\"><\u002Fcircle>\n      <\u002Fsvg>\n\n      <div style=\"position:relative; max-width:1200px; margin:0 auto; padding:clamp(72px,10vw,124px) 24px clamp(40px,5vw,64px);\">\n        <span style=\"display:inline-flex; align-items:center; gap:9px; height:32px; padding:0 14px; border-radius:999px; background:rgba(23,199,135,0.14); border:1px solid rgba(23,199,135,0.3); color:var(--accent,#17C787); font-size:12px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase;\">Операционная трансформация × ИИ<\u002Fspan>\n\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(40px,6.4vw,78px); line-height:1.02; letter-spacing:-0.025em; margin:26px 0 0; max-width:17ch;\">Не курс про ИИ. <span style=\"color:var(--accent,#17C787);\">Смена привычки<\u002Fspan>, которая закрепляется.<\u002Fh1>\n\n        <p style=\"max-width:60ch; margin:26px 0 0; font-size:clamp(16px,1.45vw,19px); line-height:1.55; color:#BDC9D3;\">Мы не консультанты, которые никогда не управляли операционно. Каждый из нас сам строил компании, менял то, как работают тысячи людей, и применяет ИИ у себя — а не рассказывает о нём.<\u002Fp>\n\n        <div style=\"display:flex; flex-wrap:wrap; gap:12px; margin-top:36px;\">\n          <button onclick=\"{{ goContacts }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:50px; padding:0 24px; border-radius:8px; border:1px solid transparent; background:var(--accent,#17C787); color:#fff; font-size:15.5px; font-weight:600; cursor:pointer; transition:background .15s ease;\" style-hover=\"background:#13B07A;\">Обсудить внедрение<\u002Fbutton>\n          <button onclick=\"{{ goResults }}\" style=\"display:inline-flex; align-items:center; gap:8px; height:50px; padding:0 22px; border-radius:8px; background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.26); font-size:15.5px; font-weight:600; cursor:pointer; transition:border-color .15s ease, background .15s ease;\" style-hover=\"border-color:#fff; background:rgba(255,255,255,0.06);\">Смотреть результаты<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showMetrics }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:relative; border-top:1px solid rgba(255,255,255,0.1);\">\n        <div style=\"max-width:1200px; margin:0 auto; padding:32px 24px clamp(40px,5vw,56px); display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:28px;\">\n          <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; flex-direction:column; gap:6px;\">\n              <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(30px,3.4vw,42px); color:var(--accent,#17C787); letter-spacing:-0.01em; line-height:1;\">{{ m.value }}<\u002Fspan>\n              <span style=\"font-size:13px; line-height:1.4; color:#8A99A4; max-width:26ch;\">{{ m.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsection>\n\n    <!-- MANIFESTO -->\n    <section style=\"background:#fff; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(56px,8vw,104px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Что такое слаживание<\u002Fspan>\n        <p style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:clamp(24px,3.2vw,38px); line-height:1.18; letter-spacing:-0.02em; margin:22px 0 0; color:#18191B; text-wrap:pretty;\">Это то, что мы прошли сами: упёрся в стену → за несколько дней прошёл сквозь неё → вернулся на место и делаешь то, что неделю назад было нереально.<\u002Fp>\n        <p style=\"margin:22px 0 0; max-width:64ch; font-size:17px; line-height:1.6; color:#5C6A75;\">Мы не учим инструменту. Мы переписываем привычку — а её не переписать рассказом о ней. ИИ при этом применён оператором в реальном процессе, а не показан на слайде.<\u002Fp>\n\n        <!-- БЫЛО → СТАЛО -->\n        <div style=\"margin-top:48px; border:1px solid #E2E9EE; border-radius:30px; overflow:hidden;\">\n          <div style=\"display:flex; align-items:center; gap:14px; padding:22px 28px; background:#F3F7FA; border-bottom:1px solid #E2E9EE;\">\n            <span style=\"width:44px; height:44px; border-radius:999px; background:#EFE3FB; color:#7D1DE4; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:16px; flex:none;\">М<\u002Fspan>\n            <div>\n              <div style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:17px; letter-spacing:-0.01em; color:#18191B;\">Маша, руководитель направления<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:#5C6A75; margin-top:2px;\">Один и тот же человек — до и после слаживания<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1px; background:#E2E9EE;\">\n            <div style=\"background:#fff; padding:30px;\">\n              <span style=\"display:inline-flex; align-items:center; height:26px; padding:0 12px; border-radius:999px; background:#F3F7FA; border:1px solid #E2E9EE; color:#8A99A4; font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\">Было<\u002Fspan>\n              <ul style=\"list-style:none; padding:0; margin:18px 0 0; display:flex; flex-direction:column; gap:12px;\">\n                <li style=\"display:flex; gap:11px; font-size:14.5px; line-height:1.5; color:#5C6A75;\"><span style=\"flex:none; color:#BDC9D3; margin-top:2px;\"><i data-lucide=\"minus\" style=\"width:16px; height:16px; stroke-width:2.4;\"><\u002Fi><\u002Fspan>Сама собирает лиды и разносит их по таблицам<\u002Fli>\n                <li style=\"display:flex; gap:11px; font-size:14.5px; line-height:1.5; color:#5C6A75;\"><span style=\"flex:none; color:#BDC9D3; margin-top:2px;\"><i data-lucide=\"minus\" style=\"width:16px; height:16px; stroke-width:2.4;\"><\u002Fi><\u002Fspan>Вручную готовит отчёты, КП и однотипные ответы<\u002Fli>\n                <li style=\"display:flex; gap:11px; font-size:14.5px; line-height:1.5; color:#5C6A75;\"><span style=\"flex:none; color:#BDC9D3; margin-top:2px;\"><i data-lucide=\"minus\" style=\"width:16px; height:16px; stroke-width:2.4;\"><\u002Fi><\u002Fspan>Тонет в рутине — на стратегию не остаётся времени<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div style=\"background:#fff; padding:30px; position:relative;\">\n              <span style=\"display:inline-flex; align-items:center; gap:7px; height:26px; padding:0 12px; border-radius:999px; background:#E3F8F1; border:1px solid #C7F2E2; color:#0E9E6A; font-size:12px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;\"><i data-lucide=\"arrow-right\" style=\"width:14px; height:14px; stroke-width:2.6;\"><\u002Fi> Стало<\u002Fspan>\n              <p style=\"margin:18px 0 14px; font-size:14.5px; line-height:1.5; color:#18191B; font-weight:600;\">На её функцию работают три ИИ-агента:<\u002Fp>\n              <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:12px;\">\n                <li style=\"display:flex; gap:11px; font-size:14.5px; line-height:1.5; color:#394046;\"><span style=\"flex:none; width:22px; height:22px; border-radius:7px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:12px;\">1<\u002Fspan><span><strong style=\"font-weight:600; color:#18191B;\">Сеет<\u002Fstrong> — находит и квалифицирует лиды 24/7<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:11px; font-size:14.5px; line-height:1.5; color:#394046;\"><span style=\"flex:none; width:22px; height:22px; border-radius:7px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:12px;\">2<\u002Fspan><span><strong style=\"font-weight:600; color:#18191B;\">Пашет<\u002Fstrong> — готовит отчёты, КП и черновики ответов<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:11px; font-size:14.5px; line-height:1.5; color:#394046;\"><span style=\"flex:none; width:22px; height:22px; border-radius:7px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:12px;\">3<\u002Fspan><span><strong style=\"font-weight:600; color:#18191B;\">Следит<\u002Fstrong> — держит качество и подсвечивает риски<\u002Fspan><\u002Fli>\n              <\u002Ful>\n              <p style=\"margin:18px 0 0; font-size:13.5px; line-height:1.5; color:#0E9E6A; font-weight:600;\">На очереди — четвёртый. Маша занимается стратегией, а не рутиной.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:18px 0 0; font-size:13.5px; line-height:1.5; color:#8A99A4;\">Это и есть «цифровой порядок»: не абстракция, а конкретная функция, перестроенная на связку человек + агенты.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- APPROACH TEASER -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,104px) 24px;\">\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n        <div>\n          <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Что мы делаем<\u002Fspan>\n          <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:18ch;\">Четыре слоя одного внедрения<\u002Fh2>\n        <\u002Fdiv>\n        <button onclick=\"{{ goApproach }}\" style=\"background:none; border:none; color:var(--accent,#17C787); font-size:15px; font-weight:600; cursor:pointer; padding:6px 0; display:inline-flex; align-items:center; gap:6px;\" style-hover=\"color:#13B07A;\">Подробнее о подходе →<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ directions }}\" as=\"d\" hint-placeholder-count=\"4\">\n          <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:28px; transition:border-color .15s ease, transform .15s ease, box-shadow .15s ease;\" style-hover=\"border-color:#D2D9DF; transform:translateY(-3px); box-shadow:0 8px 16px 0 rgba(92,106,117,0.1);\">\n            <span style=\"width:52px; height:52px; border-radius:13px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center; flex:none;\"><i data-lucide=\"{{ d.icon }}\" style=\"width:25px; height:25px; stroke-width:1.6;\"><\u002Fi><\u002Fspan>\n            <h3 style=\"font-size:19px; font-weight:600; line-height:1.25; letter-spacing:-0.01em; margin:18px 0 0;\">{{ d.title }}<\u002Fh3>\n            <p style=\"margin:10px 0 0; font-size:14px; line-height:1.55; color:#5C6A75;\">{{ d.desc }}<\u002Fp>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RESULTS TEASER -->\n    <section style=\"background:#fff; border-top:1px solid #E2E9EE; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,104px) 24px;\">\n        <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n          <div>\n            <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Результаты<\u002Fspan>\n            <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:20ch;\">Цифры, которые мы привели в реальных компаниях<\u002Fh2>\n          <\u002Fdiv>\n          <button onclick=\"{{ goResults }}\" style=\"background:none; border:none; color:var(--accent,#17C787); font-size:15px; font-weight:600; cursor:pointer; padding:6px 0;\" style-hover=\"color:#13B07A;\">Все кейсы →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px;\">\n          <sc-for list=\"{{ resultsTop }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <article style=\"background:#F3F7FA; border:1px solid #E2E9EE; border-radius:5px; padding:28px; display:flex; flex-direction:column;\">\n              <span style=\"font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#8A99A4;\">{{ p.sector }}<\u002Fspan>\n              <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(26px,2.6vw,34px); letter-spacing:-0.01em; color:var(--accent,#17C787); margin:14px 0 0; line-height:1;\">{{ p.metric }}<\u002Fspan>\n              <h3 style=\"font-size:17px; font-weight:600; line-height:1.3; margin:14px 0 0;\">{{ p.title }}<\u002Fh3>\n              <p style=\"margin:8px 0 0; font-size:13.5px; line-height:1.5; color:#5C6A75;\">{{ p.desc }}<\u002Fp>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- METHOD TEASER (две стены) -->\n    <section style=\"background:#18191B; color:#fff;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,104px) 24px;\">\n        <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n          <div>\n            <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Как это работает<\u002Fspan>\n            <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:16ch;\">Сквозь стену — за несколько дней<\u002Fh2>\n          <\u002Fdiv>\n          <button onclick=\"{{ goProcess }}\" style=\"background:none; border:none; color:var(--accent,#17C787); font-size:15px; font-weight:600; cursor:pointer; padding:6px 0;\" style-hover=\"color:#3BD89F;\">Весь процесс →<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top:44px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); border-radius:5px; overflow:hidden;\">\n          <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:#18191B; padding:28px;\">\n              <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:14px; color:var(--accent,#17C787);\">0{{ s.num }}<\u002Fspan>\n              <h3 style=\"font-size:18px; font-weight:600; margin:12px 0 0; color:#fff;\">{{ s.title }}<\u002Fh3>\n              <p style=\"margin:8px 0 0; font-size:13.5px; line-height:1.5; color:#9aa6b0;\">{{ s.short }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOUNDERS TEASER -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,104px) 24px;\">\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;\">\n        <div>\n          <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Команда<\u002Fspan>\n          <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:22ch;\">Операторы, а не лекторы про ИИ<\u002Fh2>\n        <\u002Fdiv>\n        <button onclick=\"{{ goTeam }}\" style=\"background:none; border:none; color:var(--accent,#17C787); font-size:15px; font-weight:600; cursor:pointer; padding:6px 0;\" style-hover=\"color:#13B07A;\">Вся команда →<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ founders }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:26px;\">\n            <span style=\"width:56px; height:56px; border-radius:999px; background:{{ f.toneBg }}; color:{{ f.toneFg }}; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:18px;\">{{ f.initials }}<\u002Fspan>\n            <h3 style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:19px; letter-spacing:-0.01em; margin:18px 0 0;\">{{ f.name }}<\u002Fh3>\n            <div style=\"font-size:12px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:var(--accent,#17C787); margin-top:5px;\">{{ f.role }}<\u002Fdiv>\n            <p style=\"margin:14px 0 0; font-size:14px; line-height:1.5; color:#5C6A75; font-style:italic;\">{{ f.lead }}<\u002Fp>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CTA -->\n    <section style=\"background:var(--accent,#17C787);\">\n      <div style=\"max-width:1100px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px; text-align:center;\">\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(30px,4.2vw,52px); line-height:1.05; letter-spacing:-0.02em; color:#fff; max-width:18ch; margin:0 auto;\">Покажем эффект на вашем процессе<\u002Fh2>\n        <p style=\"margin:18px auto 0; max-width:54ch; font-size:17px; line-height:1.55; color:rgba(255,255,255,0.88);\">Начинаем с диагностики, где ИИ и смена поведения дают деньги. Модель оплаты — процент от достигнутой экономии.<\u002Fp>\n        <button onclick=\"{{ goContacts }}\" style=\"margin-top:32px; display:inline-flex; align-items:center; gap:8px; height:52px; padding:0 28px; border-radius:8px; border:none; background:#fff; color:#18191B; font-size:16px; font-weight:600; cursor:pointer; transition:transform .15s ease;\" style-hover=\"transform:translateY(-2px);\">Обсудить внедрение<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== ПОДХОД ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isApproach }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <section style=\"background:#fff; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(56px,7vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Подход<\u002Fspan>\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(34px,5vw,60px); line-height:1.03; letter-spacing:-0.025em; margin:18px 0 0; max-width:18ch;\">Меняем поведение организации и встраиваем ИИ как операционный слой<\u002Fh1>\n        <p style=\"margin:24px 0 0; max-width:64ch; font-size:18px; line-height:1.6; color:#5C6A75;\">Слаживание — не курс «про ИИ». Мы не учим инструменту, мы переписываем привычку. А привычку не переписать рассказом о ней — поэтому ИИ применяется оператором в реальном процессе, а не на слайде.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ directions }}\" as=\"d\" hint-placeholder-count=\"4\">\n          <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:32px;\">\n            <span style=\"width:56px; height:56px; border-radius:14px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center;\"><i data-lucide=\"{{ d.icon }}\" style=\"width:27px; height:27px; stroke-width:1.6;\"><\u002Fi><\u002Fspan>\n            <h3 style=\"font-size:22px; font-weight:600; line-height:1.2; letter-spacing:-0.01em; margin:20px 0 0;\">{{ d.title }}<\u002Fh3>\n            <p style=\"margin:12px 0 0; font-size:15px; line-height:1.6; color:#5C6A75;\">{{ d.long }}<\u002Fp>\n            <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-top:20px;\">\n              <sc-for list=\"{{ d.tags }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <span style=\"display:inline-flex; align-items:center; height:27px; padding:0 11px; border-radius:999px; background:#F3F7FA; border:1px solid #E2E9EE; font-size:12.5px; font-weight:500; color:#5C6A75;\">{{ t }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"background:#18191B; color:#fff;\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(48px,6vw,88px) 24px; text-align:center;\">\n        <p style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:clamp(22px,3vw,34px); line-height:1.2; letter-spacing:-0.015em; margin:0; max-width:24ch; margin-left:auto; margin-right:auto;\">Масштаб мы доказываем цифрой, а не логотипом. Поведение — закреплением, а не тренингом.<\u002Fp>\n        <button onclick=\"{{ goResults }}\" style=\"margin-top:28px; display:inline-flex; align-items:center; gap:8px; height:48px; padding:0 22px; border-radius:8px; border:none; background:var(--accent,#17C787); color:#fff; font-size:15px; font-weight:600; cursor:pointer;\" style-hover=\"background:#13B07A;\">Смотреть результаты →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== ПЛАТФОРМА ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isPlatform }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <!-- HERO -->\n    <section style=\"position:relative; background:#18191B; color:#fff; overflow:hidden;\">\n      <svg viewBox=\"0 0 600 600\" width=\"560\" height=\"560\" fill=\"none\" style=\"position:absolute; top:-110px; right:-120px; opacity:0.16; pointer-events:none;\">\n        <g stroke=\"var(--accent,#17C787)\" stroke-width=\"2\" fill=\"none\">\n          <path d=\"M120 240 C 240 110, 360 110, 480 240\"><\u002Fpath>\n          <path d=\"M150 270 C 250 165, 350 165, 450 270\"><\u002Fpath>\n          <path d=\"M180 300 C 258 218, 342 218, 420 300\"><\u002Fpath>\n        <\u002Fg>\n        <circle cx=\"300\" cy=\"300\" r=\"9\" fill=\"var(--accent,#17C787)\"><\u002Fcircle>\n      <\u002Fsvg>\n      <div style=\"position:relative; max-width:1100px; margin:0 auto; padding:clamp(56px,7vw,96px) 24px;\">\n        <span style=\"display:inline-flex; align-items:center; gap:9px; height:32px; padding:0 14px; border-radius:999px; background:rgba(23,199,135,0.14); border:1px solid rgba(23,199,135,0.3); color:var(--accent,#17C787); font-size:12px; font-weight:700; letter-spacing:0.07em; text-transform:uppercase;\">Слаживание Платформа · для бизнеса 200–1000 человек<\u002Fspan>\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(34px,5vw,60px); line-height:1.03; letter-spacing:-0.025em; margin:22px 0 0; max-width:17ch;\">ИИ как <span style=\"color:var(--accent,#17C787);\">операционный слой<\u002Fspan> компании<\u002Fh1>\n        <p style=\"margin:24px 0 0; max-width:62ch; font-size:18px; line-height:1.6; color:#BDC9D3;\">Корпоративный ИИ-ассистент, который обрабатывает информационный поток компании — звонки, встречи, лиды, документы — и делает выводы быстрее, чем команда людей. Слой над вашими 1С, CRM, телефонией, диском и почтой.<\u002Fp>\n        <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:24px;\">\n          <sc-for list=\"{{ platMarket }}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; flex-direction:column; gap:6px;\">\n              <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.2vw,38px); color:var(--accent,#17C787); letter-spacing:-0.01em; line-height:1;\">{{ m.value }}<\u002Fspan>\n              <span style=\"font-size:13px; line-height:1.45; color:#8A99A4; max-width:30ch;\">{{ m.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHAT IT ISN'T -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n      <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Что это<\u002Fspan>\n      <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:22ch;\">Готовый продукт, а не эксперимент в облаке за рубежом<\u002Fh2>\n      <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ platWhat }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:30px;\">\n            <span style=\"display:inline-flex; align-items:center; height:27px; padding:0 12px; border-radius:999px; background:#FFEEE0; color:#C54600; font-size:12.5px; font-weight:600;\">{{ w.not }}<\u002Fspan>\n            <p style=\"margin:16px 0 0; font-size:15px; line-height:1.6; color:#5C6A75;\">{{ w.body }}<\u002Fp>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 6 SCENARIOS -->\n    <section style=\"background:#fff; border-top:1px solid #E2E9EE; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Шесть сценариев из коробки<\u002Fspan>\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:20ch;\">Это и есть Слаживание Платформа<\u002Fh2>\n        <p style=\"margin:16px 0 0; max-width:64ch; font-size:16px; line-height:1.6; color:#5C6A75;\">Не кастомная разработка — сценарии работают из коробки и подключаются по выбору. Внедряете все шесть в первом релизе или начинаете с одного.<\u002Fp>\n        <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:20px;\">\n          <sc-for list=\"{{ platScenarios }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <article style=\"background:#F3F7FA; border:1px solid #E2E9EE; border-radius:5px; padding:28px; display:flex; flex-direction:column; transition:border-color .15s ease, box-shadow .15s ease;\" style-hover=\"border-color:#D2D9DF; box-shadow:0 8px 16px 0 rgba(92,106,117,0.1);\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                <span style=\"width:50px; height:50px; border-radius:13px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center; flex:none;\"><i data-lucide=\"{{ s.icon }}\" style=\"width:24px; height:24px; stroke-width:1.6;\"><\u002Fi><\u002Fspan>\n                <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:13px; color:#BDC9D3;\">{{ s.no }}<\u002Fspan>\n              <\u002Fdiv>\n              <h3 style=\"font-size:19px; font-weight:600; line-height:1.25; letter-spacing:-0.01em; margin:18px 0 0;\">{{ s.title }}<\u002Fh3>\n              <p style=\"margin:10px 0 0; font-size:14px; line-height:1.55; color:#5C6A75;\">{{ s.body }}<\u002Fp>\n              <div style=\"margin-top:auto; padding-top:16px;\"><span style=\"display:inline-flex; align-items:center; height:28px; padding:0 12px; border-radius:999px; background:#E3F8F1; color:#0E9E6A; font-size:12.5px; font-weight:600;\">{{ s.effect }}<\u002Fspan><\u002Fdiv>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ARCHITECTURE -->\n    <section style=\"background:#18191B; color:#fff;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Архитектура<\u002Fspan>\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:20ch;\">Одна платформа — четыре модели под капотом<\u002Fh2>\n        <p style=\"margin:16px 0 0; max-width:66ch; font-size:16px; line-height:1.6; color:#BDC9D3;\">Маршрутизатор выбирает модель под задачу автоматически. Стратегия — лучшей моделью, рутина — самой дешёвой, регулируемые данные не покидают РФ.<\u002Fp>\n        <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.1); border-radius:5px; overflow:hidden;\">\n          <sc-for list=\"{{ platModels }}\" as=\"m\" hint-placeholder-count=\"4\">\n            <div style=\"background:#18191B; padding:28px;\">\n              <h3 style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:20px; letter-spacing:-0.01em; color:var(--accent,#17C787); margin:0;\">{{ m.name }}<\u002Fh3>\n              <p style=\"margin:10px 0 0; font-size:13.5px; line-height:1.5; color:#9aa6b0;\">{{ m.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- INTEGRATIONS -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n      <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Семь интеграций · в первом релизе<\u002Fspan>\n      <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:20ch;\">Это коробка. Подключается в первые недели<\u002Fh2>\n      <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;\">\n        <sc-for list=\"{{ platIntegrations }}\" as=\"i\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:22px;\">\n            <div style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:17px; letter-spacing:-0.01em;\">{{ i.name }}<\u002Fdiv>\n            <div style=\"font-size:13px; color:#5C6A75; margin-top:6px;\">{{ i.kind }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"background:#F3F7FA; border:1px dashed #BDC9D3; border-radius:5px; padding:22px; display:flex; align-items:center;\">\n          <div style=\"font-size:13px; line-height:1.5; color:#5C6A75;\">Дополнительные интеграции под клиента — на этапе пилота<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECURITY / 152-ФЗ -->\n    <section style=\"background:#fff; border-top:1px solid #E2E9EE; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Безопасность · 152-ФЗ<\u002Fspan>\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:22ch;\">Главное возражение CEO решено в архитектуре<\u002Fh2>\n        <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px;\">\n          <sc-for list=\"{{ platSecurity }}\" as=\"sec\" hint-placeholder-count=\"3\">\n            <article style=\"background:#F3F7FA; border:1px solid #E2E9EE; border-radius:5px; padding:30px;\">\n              <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:14px; color:var(--accent,#17C787);\">{{ sec.no }}<\u002Fspan>\n              <h3 style=\"font-size:19px; font-weight:600; line-height:1.25; letter-spacing:-0.01em; margin:12px 0 0;\">{{ sec.title }}<\u002Fh3>\n              <p style=\"margin:10px 0 0; font-size:14px; line-height:1.55; color:#5C6A75;\">{{ sec.body }}<\u002Fp>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px;\">\n          <sc-for list=\"{{ platDeploy }}\" as=\"d\" hint-placeholder-count=\"3\">\n            <article style=\"background:#18191B; color:#fff; border-radius:5px; padding:28px;\">\n              <h3 style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:18px; letter-spacing:-0.01em; color:var(--accent,#17C787); margin:0;\">{{ d.title }}<\u002Fh3>\n              <p style=\"margin:8px 0 0; font-size:13.5px; line-height:1.5; color:#BDC9D3;\">{{ d.body }}<\u002Fp>\n              <div style=\"margin-top:14px; font-size:12.5px; font-weight:600; letter-spacing:0.03em; color:#8A99A4;\">{{ d.time }}<\u002Fdiv>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ECONOMICS -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n      <div style=\"background:#18191B; color:#fff; border-radius:30px; padding:clamp(36px,5vw,64px); position:relative; overflow:hidden;\">\n        <div style=\"position:absolute; top:-120px; right:-80px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle, rgba(23,199,135,0.16) 0%, rgba(23,199,135,0) 70%); pointer-events:none;\"><\u002Fdiv>\n        <div style=\"position:relative; max-width:680px;\">\n          <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Пример экономики · компания 500 человек<\u002Fspan>\n          <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; margin:14px 0 0;\">ROI 269% в первый год, окупаемость ~3 месяца<\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"position:relative; margin-top:44px; display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:48px;\">\n          <div>\n            <div style=\"font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#8A99A4; margin-bottom:14px;\">Инвестиции в год<\u002Fdiv>\n            <sc-for list=\"{{ platInvest }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; justify-content:space-between; gap:16px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.1);\">\n                <span style=\"font-size:14px; line-height:1.45; color:#BDC9D3;\">{{ r.label }}<\u002Fspan>\n                <span style=\"font-size:15px; font-weight:600; color:#fff; white-space:nowrap;\">{{ r.value }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--accent,#17C787); margin-bottom:14px;\">Экономия в год (консервативно)<\u002Fdiv>\n            <sc-for list=\"{{ platSave }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; justify-content:space-between; gap:16px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.1);\">\n                <span style=\"font-size:14px; line-height:1.45; color:#BDC9D3;\">{{ r.label }}<\u002Fspan>\n                <span style=\"font-size:15px; font-weight:600; color:var(--accent,#17C787); white-space:nowrap;\">{{ r.value }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- PLANS -->\n    <section style=\"background:#F3F7FA; border-top:1px solid #E2E9EE;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Как начать<\u002Fspan>\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,3.6vw,44px); line-height:1.07; letter-spacing:-0.02em; margin:14px 0 0; max-width:18ch;\">Три способа войти в Платформу<\u002Fh2>\n        <div style=\"margin-top:40px; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px;\">\n          <sc-for list=\"{{ platPlans }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <article style=\"background:{{ p.bg }}; border:1px solid {{ p.border }}; border-radius:5px; padding:32px; display:flex; flex-direction:column; color:{{ p.fg }};\">\n              <span style=\"font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:{{ p.muted }};\">{{ p.kind }}<\u002Fspan>\n              <h3 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:25px; letter-spacing:-0.02em; margin:12px 0 0;\">{{ p.title }}<\u002Fh3>\n              <div style=\"margin:10px 0 0; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;\">\n                <span style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:22px; color:var(--accent,#17C787);\">{{ p.price }}<\u002Fspan>\n                <span style=\"font-size:13px; color:{{ p.muted }};\">{{ p.unit }}<\u002Fspan>\n              <\u002Fdiv>\n              <ul style=\"list-style:none; padding:0; margin:20px 0 0; display:flex; flex-direction:column; gap:11px;\">\n                <sc-for list=\"{{ p.points }}\" as=\"pt\" hint-placeholder-count=\"4\">\n                  <li style=\"display:flex; gap:10px; font-size:14px; line-height:1.5; color:{{ p.fg2 }};\">\n                    <span style=\"flex:none; width:18px; height:18px; border-radius:6px; background:{{ p.tick }}; color:{{ p.tickFg }}; display:inline-flex; align-items:center; justify-content:center; margin-top:1px;\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                    <span>{{ pt }}<\u002Fspan>\n                  <\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"margin:24px 0 0; max-width:90ch; font-size:13.5px; line-height:1.6; color:#5C6A75;\">Тарифы подписки: <strong style=\"color:#202526; font-weight:600;\">Бизнес — 2 500 ₽/чел/мес<\u002Fstrong> (средние компании, от 5 пользователей) · <strong style=\"color:#202526; font-weight:600;\">Корпоративный — от 5 000 ₽/чел/мес<\u002Fstrong> (крупные и регулируемые, on-prem, 152-ФЗ, от 200 пользователей). 25% подписки аллоцируется в бюджет на токены.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CTA -->\n    <section style=\"background:var(--accent,#17C787);\">\n      <div style=\"max-width:1100px; margin:0 auto; padding:clamp(56px,8vw,96px) 24px; text-align:center;\">\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(28px,4vw,48px); line-height:1.06; letter-spacing:-0.02em; color:#fff; max-width:18ch; margin:0 auto;\">Один разговор на 60 минут<\u002Fh2>\n        <p style=\"margin:18px auto 0; max-width:56ch; font-size:17px; line-height:1.55; color:rgba(255,255,255,0.88);\">Без подготовки и обязательств. Разбираем 1–2 ваших процесса вживую и показываем, какой сценарий Платформы закрывает каждый.<\u002Fp>\n        <button onclick=\"{{ goContacts }}\" style=\"margin-top:32px; display:inline-flex; align-items:center; gap:8px; height:52px; padding:0 28px; border-radius:8px; border:none; background:#fff; color:#18191B; font-size:16px; font-weight:600; cursor:pointer; transition:transform .15s ease;\" style-hover=\"transform:translateY(-2px);\">Получить диагностику<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== HR ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isHR }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"HR\">\n    <!-- HERO -->\n    <section style=\"position:relative; background:#18191B; color:#fff; overflow:hidden;\">\n      <svg viewBox=\"0 0 600 600\" width=\"560\" height=\"560\" fill=\"none\" style=\"position:absolute; top:-110px; right:-120px; opacity:0.16; pointer-events:none;\">\n        <g stroke=\"var(--accent,#17C787)\" stroke-width=\"2\" fill=\"none\">\n          <path d=\"M40 360 C 200 200, 400 200, 560 360\"><\u002Fpath>\n          <path d=\"M40 240 C 200 400, 400 400, 560 240\"><\u002Fpath>\n        <\u002Fg>\n      <\u002Fsvg>\n      <div style=\"position:relative; max-width:1100px; margin:0 auto; padding:clamp(64px,8vw,108px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">HR × ИИ<\u002Fspan>\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(32px,5vw,60px); line-height:1.04; letter-spacing:-0.025em; margin:16px 0 0; max-width:20ch;\">ИИ в HR-функции: от инструментов к организационной эффективности<\u002Fh1>\n        <p style=\"margin:22px 0 0; max-width:60ch; font-size:clamp(16px,1.6vw,19px); line-height:1.6; color:#BDC9D3;\">Слаживание — организационная подготовка, которая превращает ИИ-инструменты из неизвестного в управляемое и эффективное. Семь функциональных блоков HR, и в каждом: боль → ИИ-решение → роль Слаживания.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- LIFECYCLE STRIP -->\n    <section style=\"background:#fff; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Жизненный цикл сотрудника<\u002Fspan>\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; margin:14px 0 8px; max-width:24ch;\">Семь блоков HR — а в центре Слаживание как организационное ядро<\u002Fh2>\n        <p style=\"margin:0 0 32px; max-width:62ch; font-size:16px; line-height:1.6; color:#5C6A75;\">От найма до вознаграждения и кадрового учёта. ИИ заходит в каждый блок, но работает только там, где блоки между собой согласованы.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px;\">\n          <sc-for list=\"{{ hrBlocks }}\" as=\"b\" hint-placeholder-count=\"7\">\n            <div style=\"background:#F3F7FA; border:1px solid #E2E9EE; border-radius:8px; padding:16px 16px 18px; display:flex; flex-direction:column; gap:10px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n                <span style=\"width:34px; height:34px; border-radius:8px; background:#fff; border:1px solid #E2E9EE; display:inline-flex; align-items:center; justify-content:center; color:var(--accent,#17C787);\"><i data-lucide=\"{{ b.icon }}\" style=\"width:18px; height:18px; stroke-width:1.8;\"><\u002Fi><\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#BDC9D3;\">{{ b.no }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size:13.5px; font-weight:600; line-height:1.3; color:#18191B;\">{{ b.title }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 7 BLOCKS DETAIL -->\n    <section style=\"background:#F3F7FA;\">\n      <div style=\"max-width:1200px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px; display:flex; flex-direction:column; gap:20px;\">\n        <sc-for list=\"{{ hrBlocks }}\" as=\"b\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff; border:1px solid #E2E9EE; border-radius:30px; overflow:hidden;\">\n            <div style=\"display:flex; align-items:center; gap:16px; padding:26px clamp(24px,3vw,36px); border-bottom:1px solid #E2E9EE;\">\n              <span style=\"flex:none; width:48px; height:48px; border-radius:12px; background:#E3F8F1; display:inline-flex; align-items:center; justify-content:center; color:#0E9E6A;\"><i data-lucide=\"{{ b.icon }}\" style=\"width:24px; height:24px; stroke-width:1.7;\"><\u002Fi><\u002Fspan>\n              <div style=\"flex:1;\">\n                <div style=\"display:flex; align-items:baseline; gap:10px;\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--accent,#17C787); font-weight:600;\">{{ b.no }}<\u002Fspan>\n                  <h3 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(19px,2.2vw,26px); letter-spacing:-0.015em; margin:0; color:#18191B;\">{{ b.title }}<\u002Fh3>\n                <\u002Fdiv>\n                <p style=\"margin:3px 0 0; font-size:14px; color:#8A99A4;\">{{ b.sub }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1px; background:#E2E9EE;\">\n              <div style=\"background:#fff; padding:26px clamp(20px,2.6vw,30px);\">\n                <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#C54600; margin-bottom:14px;\"><i data-lucide=\"alert-circle\" style=\"width:14px; height:14px; stroke-width:2.2;\"><\u002Fi> Боль<\u002Fspan>\n                <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:11px;\">\n                  <sc-for list=\"{{ b.pain }}\" as=\"p\" hint-placeholder-count=\"3\">\n                    <li style=\"display:flex; gap:10px; font-size:14px; line-height:1.5; color:#5C6A75;\"><span style=\"flex:none; color:#E8A48C; margin-top:1px;\"><i data-lucide=\"minus\" style=\"width:15px; height:15px; stroke-width:2.4;\"><\u002Fi><\u002Fspan>{{ p }}<\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div style=\"background:#fff; padding:26px clamp(20px,2.6vw,30px);\">\n                <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#0E9E6A; margin-bottom:14px;\"><i data-lucide=\"sparkles\" style=\"width:14px; height:14px; stroke-width:2.2;\"><\u002Fi> ИИ-решение<\u002Fspan>\n                <ul style=\"list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:11px;\">\n                  <sc-for list=\"{{ b.ai }}\" as=\"a\" hint-placeholder-count=\"3\">\n                    <li style=\"display:flex; gap:10px; font-size:14px; line-height:1.5; color:#394046;\"><span style=\"flex:none; color:#0E9E6A; margin-top:1px;\"><i data-lucide=\"check\" style=\"width:15px; height:15px; stroke-width:2.6;\"><\u002Fi><\u002Fspan>{{ a }}<\u002Fli>\n                  <\u002Fsc-for>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div style=\"background:#18191B; padding:26px clamp(20px,2.6vw,30px); color:#fff;\">\n                <span style=\"display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--accent,#17C787); margin-bottom:14px;\"><i data-lucide=\"link\" style=\"width:14px; height:14px; stroke-width:2.2;\"><\u002Fi> Роль Слаживания<\u002Fspan>\n                <p style=\"margin:0; font-size:14px; line-height:1.6; color:#D2D9DF;\">{{ b.role }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- HRD DASHBOARD CALLOUT -->\n    <section style=\"background:#fff; border-top:1px solid #E2E9EE;\">\n      <div style=\"max-width:1100px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px;\">\n        <div style=\"background:#E3F8F1; border:1px solid #C7F2E2; border-radius:30px; padding:clamp(32px,4vw,52px); display:flex; flex-wrap:wrap; gap:32px; align-items:center; justify-content:space-between;\">\n          <div style=\"flex:1; min-width:260px;\">\n            <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:#0E9E6A;\">Для HRD<\u002Fspan>\n            <h3 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(22px,2.8vw,32px); line-height:1.1; letter-spacing:-0.02em; margin:12px 0 10px; color:#07120D; max-width:24ch;\">Единый дашборд функции — стратегический взгляд, а не семь разных таблиц<\u002Fh3>\n            <p style=\"margin:0; font-size:16px; line-height:1.6; color:#0A2A1E; max-width:52ch;\">Текучесть, headcount, ФОТ, вовлечённость и воронка найма — в одном месте и в реальном времени. С предиктивной аналитикой и нарративными отчётами для правления.<\u002Fp>\n          <\u002Fdiv>\n          <button onclick=\"{{ goContacts }}\" style=\"flex:none; background:#07120D; color:#fff; border:none; border-radius:12px; padding:16px 28px; font-family:'IBM Plex Sans',sans-serif; font-size:16px; font-weight:600; cursor:pointer;\">Обсудить HR-внедрение<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHY NOT WITHOUT SLAZHIVANIE -->\n    <section style=\"background:#18191B; color:#fff;\">\n      <div style=\"max-width:1100px; margin:0 auto; padding:clamp(48px,6vw,84px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Почему ИИ в HR не приживается сам<\u002Fspan>\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(26px,3.4vw,40px); line-height:1.08; letter-spacing:-0.02em; margin:14px 0 36px; max-width:24ch;\">Инструмент покупают за день. Привычку меняют слаживанием<\u002Fh2>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px;\">\n          <sc-for list=\"{{ hrWhy }}\" as=\"w\" hint-placeholder-count=\"4\">\n            <div style=\"background:#202326; border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:26px;\">\n              <div style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:28px; color:var(--accent,#17C787); line-height:1; margin-bottom:14px;\">{{ w.no }}<\u002Fdiv>\n              <p style=\"margin:0; font-size:15px; line-height:1.6; color:#D2D9DF;\">{{ w.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== РЕЗУЛЬТАТЫ ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <section style=\"background:#fff; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(56px,7vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Результаты<\u002Fspan>\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(34px,5vw,60px); line-height:1.03; letter-spacing:-0.025em; margin:18px 0 0; max-width:16ch;\">Что меняется в цифрах<\u002Fh1>\n        <p style=\"margin:24px 0 0; max-width:60ch; font-size:18px; line-height:1.6; color:#5C6A75;\">Каждый кейс — из практики команды: реальные организации, реальная экономика. Не демонстрация инструмента, а закреплённый результат.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ results }}\" as=\"p\" hint-placeholder-count=\"6\">\n          <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:30px; display:flex; flex-direction:column; transition:border-color .15s ease, box-shadow .15s ease;\" style-hover=\"border-color:#D2D9DF; box-shadow:0 8px 16px 0 rgba(92,106,117,0.1);\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px;\">\n              <span style=\"font-size:12px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:#8A99A4;\">{{ p.sector }}<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(30px,3vw,40px); letter-spacing:-0.015em; color:var(--accent,#17C787); margin:16px 0 0; line-height:1;\">{{ p.metric }}<\u002Fspan>\n            <h3 style=\"font-size:19px; font-weight:600; line-height:1.28; margin:14px 0 0;\">{{ p.title }}<\u002Fh3>\n            <p style=\"margin:10px 0 0; font-size:14.5px; line-height:1.55; color:#5C6A75;\">{{ p.desc }}<\u002Fp>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"background:var(--accent,#17C787);\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px; text-align:center;\">\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(26px,3.6vw,42px); line-height:1.08; letter-spacing:-0.02em; color:#fff; margin:0; max-width:20ch; margin-left:auto; margin-right:auto;\">Посчитаем эффект для вашей компании<\u002Fh2>\n        <button onclick=\"{{ goContacts }}\" style=\"margin-top:26px; display:inline-flex; align-items:center; gap:8px; height:50px; padding:0 26px; border-radius:8px; border:none; background:#fff; color:#18191B; font-size:16px; font-weight:600; cursor:pointer;\" style-hover=\"transform:translateY(-2px);\">Оставить заявку<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== КОМАНДА ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isTeam }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <section style=\"background:#fff; border-bottom:1px solid #E2E9EE;\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(56px,7vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Команда<\u002Fspan>\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(34px,5vw,60px); line-height:1.03; letter-spacing:-0.025em; margin:18px 0 0; max-width:18ch;\">Сами строили компании. Сами применяем ИИ.<\u002Fh1>\n        <p style=\"margin:24px 0 0; max-width:64ch; font-size:18px; line-height:1.6; color:#5C6A75;\">Каждый из нас менял то, как работают тысячи людей в реальных организациях. Мы продаём смену поведения, которая закрепляется, и ИИ, применённый оператором, — потому что прошли это сами.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FOUNDERS -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px 0;\">\n      <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(22px,2.6vw,30px); letter-spacing:-0.015em; margin:0 0 28px;\">Основатели<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(420px,1fr)); gap:20px;\">\n        <sc-for list=\"{{ founders }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:32px; display:flex; flex-direction:column;\">\n            <header style=\"display:flex; align-items:center; gap:16px;\">\n              <span style=\"width:60px; height:60px; border-radius:999px; background:{{ f.toneBg }}; color:{{ f.toneFg }}; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:20px; flex:none;\">{{ f.initials }}<\u002Fspan>\n              <div>\n                <h3 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:22px; letter-spacing:-0.01em; line-height:1.1;\">{{ f.name }}<\u002Fh3>\n                <div style=\"font-size:12.5px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:var(--accent,#17C787); margin-top:5px;\">{{ f.role }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fheader>\n            <p style=\"font-style:italic; color:#18191B; font-size:16px; line-height:1.5; margin:20px 0 0;\">{{ f.lead }}<\u002Fp>\n            <ul style=\"list-style:none; padding:0; margin:18px 0 0; display:flex; flex-direction:column; gap:13px;\">\n              <sc-for list=\"{{ f.bullets }}\" as=\"b\" hint-placeholder-count=\"4\">\n                <li style=\"display:flex; gap:11px; font-size:14px; line-height:1.55; color:#5C6A75;\">\n                  <span style=\"flex:none; width:19px; height:19px; border-radius:6px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center; margin-top:1px;\"><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                  <span>{{ b }}<\u002Fspan>\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n            <div style=\"margin-top:22px; padding-top:18px; border-top:1px solid #E2E9EE; font-size:12.5px; line-height:1.55; color:#8A99A4;\">{{ f.scale }}<\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- DELIVERY TEAM -->\n    <section style=\"max-width:1200px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px;\">\n      <div style=\"border-top:1px solid #E2E9EE; padding-top:clamp(40px,5vw,64px);\">\n        <h2 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(20px,2.4vw,26px); letter-spacing:-0.015em; margin:0;\">Команда внедрения<\u002Fh2>\n        <p style=\"margin:10px 0 0; max-width:56ch; font-size:15px; line-height:1.55; color:#8A99A4;\">Те, кто доставляет внедрение в процессах и данных — от проектирования сценариев до закрепления навыка в отделе.<\u002Fp>\n        <div style=\"margin-top:32px; display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:18px;\">\n          <sc-for list=\"{{ delivery }}\" as=\"d\" hint-placeholder-count=\"3\">\n            <article style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:26px; display:flex; flex-direction:column;\">\n              <header style=\"display:flex; align-items:center; gap:13px;\">\n                <span style=\"width:48px; height:48px; border-radius:999px; background:{{ d.toneBg }}; color:{{ d.toneFg }}; display:inline-flex; align-items:center; justify-content:center; font-family:'Manrope',sans-serif; font-weight:700; font-size:16px; flex:none;\">{{ d.initials }}<\u002Fspan>\n                <div>\n                  <h3 style=\"font-weight:600; font-size:17px; line-height:1.2;\">{{ d.name }}<\u002Fh3>\n                  <div style=\"font-size:11.5px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase; color:#5C6A75; margin-top:4px;\">{{ d.role }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fheader>\n              <p style=\"font-style:italic; color:#202526; font-size:14px; line-height:1.5; margin:16px 0 0;\">{{ d.lead }}<\u002Fp>\n              <ul style=\"list-style:none; padding:0; margin:14px 0 0; display:flex; flex-direction:column; gap:10px;\">\n                <sc-for list=\"{{ d.bullets }}\" as=\"b\" hint-placeholder-count=\"3\">\n                  <li style=\"display:flex; gap:9px; font-size:13px; line-height:1.5; color:#5C6A75;\">\n                    <span style=\"flex:none; width:5px; height:5px; border-radius:999px; background:var(--accent,#17C787); margin-top:7px;\"><\u002Fspan>\n                    <span>{{ b }}<\u002Fspan>\n                  <\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n              <div style=\"margin-top:16px; padding-top:14px; border-top:1px solid #E2E9EE; font-size:11.5px; line-height:1.5; color:#8A99A4;\">{{ d.scale }}<\u002Fdiv>\n            <\u002Farticle>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== ПРОЦЕСС ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isProcess }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <section style=\"background:#18191B; color:#fff;\">\n      <div style=\"max-width:1000px; margin:0 auto; padding:clamp(56px,7vw,96px) 24px;\">\n        <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Процесс<\u002Fspan>\n        <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(34px,5vw,60px); line-height:1.03; letter-spacing:-0.025em; margin:18px 0 0; max-width:16ch;\">От стены — к новому автоматизму<\u002Fh1>\n        <p style=\"margin:24px 0 0; max-width:62ch; font-size:18px; line-height:1.6; color:#BDC9D3;\">Упёрся в стену → за несколько дней прошёл сквозь неё → вернулся на место и делаешь то, что неделю назад было нереально. Вот четыре шага, как мы это проводим.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <section style=\"max-width:980px; margin:0 auto; padding:clamp(48px,6vw,80px) 24px;\">\n      <div style=\"display:flex; flex-direction:column; gap:0;\">\n        <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex; gap:clamp(20px,3vw,40px); padding:clamp(28px,3vw,40px) 0; border-bottom:1px solid #E2E9EE;\">\n            <div style=\"flex:none; width:clamp(64px,7vw,92px);\">\n              <span style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(40px,5vw,64px); line-height:1; color:#E2E9EE; letter-spacing:-0.02em;\">0{{ s.num }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"display:flex; align-items:center; gap:12px; flex-wrap:wrap;\">\n                <h3 style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:clamp(22px,2.6vw,30px); letter-spacing:-0.015em;\">{{ s.title }}<\u002Fh3>\n                <span style=\"display:inline-flex; align-items:center; height:26px; padding:0 11px; border-radius:999px; background:#E3F8F1; color:#0E9E6A; font-size:12.5px; font-weight:600;\">{{ s.tag }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"margin:12px 0 0; max-width:60ch; font-size:16px; line-height:1.6; color:#5C6A75;\">{{ s.long }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:40px; background:#F3F7FA; border:1px solid #E2E9EE; border-radius:5px; padding:clamp(28px,3vw,40px);\">\n        <h3 style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:22px; letter-spacing:-0.015em; margin:0;\">Оплата за результат<\u002Fh3>\n        <p style=\"margin:12px 0 0; max-width:64ch; font-size:16px; line-height:1.6; color:#5C6A75;\">Мы считаем и защищаем экономику изменений до старта — value-математику внедрения. Модель оплаты — процент от достигнутой экономии. Вы платите за результат, а не за процесс.<\u002Fp>\n        <button onclick=\"{{ goContacts }}\" style=\"margin-top:22px; display:inline-flex; align-items:center; gap:8px; height:48px; padding:0 22px; border-radius:8px; border:none; background:var(--accent,#17C787); color:#fff; font-size:15px; font-weight:600; cursor:pointer;\" style-hover=\"background:#13B07A;\">Обсудить диагностику →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============================================================= -->\n  <!-- ===================== КОНТАКТЫ ===================== -->\n  <!-- ============================================================= -->\n  <sc-if value=\"{{ isContacts }}\" hint-placeholder-val=\"{{ false }}\">\n  <div>\n    <section style=\"max-width:1100px; margin:0 auto; padding:clamp(56px,7vw,96px) 24px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:clamp(32px,5vw,64px);\">\n        <div>\n          <span style=\"display:inline-block; font-size:12px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--accent,#17C787);\">Контакты<\u002Fspan>\n          <h1 style=\"font-family:'Manrope',sans-serif; font-weight:800; font-size:clamp(32px,4.4vw,52px); line-height:1.04; letter-spacing:-0.025em; margin:18px 0 0; max-width:14ch;\">Начнём с диагностики<\u002Fh1>\n          <p style=\"margin:20px 0 0; max-width:46ch; font-size:17px; line-height:1.6; color:#5C6A75;\">Расскажите, где процесс упёрся в стену. Вернёмся с оценкой эффекта и планом первого шага.<\u002Fp>\n          <div style=\"margin-top:32px; display:flex; flex-direction:column; gap:18px;\">\n            <div>\n              <div style=\"font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#8A99A4;\">Почта<\u002Fdiv>\n              <a href=\"mailto:{{ contactEmail }}\" style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:20px; color:#18191B; text-decoration:none; letter-spacing:-0.01em;\" style-hover=\"color:var(--accent,#17C787);\">{{ contactEmail }}<\u002Fa>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:12px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:#8A99A4;\">Telegram<\u002Fdiv>\n              <a href=\"https://t.me/slazhivanie\" style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:20px; color:#18191B; text-decoration:none; letter-spacing:-0.01em;\" style-hover=\"color:var(--accent,#17C787);\">@slazhivanie<\u002Fa>\n            <\u002Fdiv>\n            <div style=\"font-size:14px; color:#8A99A4;\">Отвечаем в течение рабочего дня.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff; border:1px solid #E2E9EE; border-radius:5px; padding:clamp(28px,3vw,40px);\">\n          <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; flex-direction:column; align-items:flex-start; gap:16px; padding:24px 0;\">\n              <span style=\"width:56px; height:56px; border-radius:14px; background:#E3F8F1; color:#0E9E6A; display:inline-flex; align-items:center; justify-content:center;\"><svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <h3 style=\"font-family:'Manrope',sans-serif; font-weight:700; font-size:24px; letter-spacing:-0.015em; margin:0;\">Заявка отправлена<\u002Fh3>\n              <p style=\"font-size:15px; line-height:1.6; color:#5C6A75; margin:0;\">Спасибо. Свяжемся с вами в течение рабочего дня и предложим время для диагностики.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSent }}\" hint-placeholder-val=\"{{ true }}\">\n            <form onsubmit=\"{{ submit }}\" style=\"display:flex; flex-direction:column; gap:16px;\">\n              <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                <label style=\"font-size:13px; font-weight:600; color:#202526;\">Имя<\u002Flabel>\n                <input type=\"text\" placeholder=\"Как к вам обращаться\" style=\"height:46px; padding:0 14px; border-radius:8px; border:1px solid #E2E9EE; background:#F3F7FA; font-size:15px; color:#202526; outline:none; transition:border-color .15s ease, background .15s ease;\" style-focus=\"border-color:var(--accent,#17C787); background:#fff;\">\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                <label style=\"font-size:13px; font-weight:600; color:#202526;\">Компания<\u002Flabel>\n                <input type=\"text\" placeholder=\"Название и сфера\" style=\"height:46px; padding:0 14px; border-radius:8px; border:1px solid #E2E9EE; background:#F3F7FA; font-size:15px; color:#202526; outline:none; transition:border-color .15s ease, background .15s ease;\" style-focus=\"border-color:var(--accent,#17C787); background:#fff;\">\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                <label style=\"font-size:13px; font-weight:600; color:#202526;\">Почта или телефон<\u002Flabel>\n                <input type=\"text\" placeholder=\"Куда вернуться с ответом\" style=\"height:46px; padding:0 14px; border-radius:8px; border:1px solid #E2E9EE; background:#F3F7FA; font-size:15px; color:#202526; outline:none; transition:border-color .15s ease, background .15s ease;\" style-focus=\"border-color:var(--accent,#17C787); background:#fff;\">\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:7px;\">\n                <label style=\"font-size:13px; font-weight:600; color:#202526;\">Где процесс упёрся в стену<\u002Flabel>\n                <textarea rows=\"4\" placeholder=\"Коротко опишите задачу или процесс\" style=\"padding:12px 14px; border-radius:8px; border:1px solid #E2E9EE; background:#F3F7FA; font-size:15px; color:#202526; outline:none; resize:vertical; line-height:1.5; transition:border-color .15s ease, background .15s ease;\" style-focus=\"border-color:var(--accent,#17C787); background:#fff;\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <button type=\"submit\" style=\"margin-top:4px; height:50px; border-radius:8px; border:none; background:var(--accent,#17C787); color:#fff; font-
