name: Deploy cockpit to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Рекомендация GitHub Pages: один деплой за раз, НО не отменять in-progress —
# отмена прогона не отменяет уже созданный на бэкенде деплой, они коллизят и
# дают транзиентное «Deployment failed, try again later». false = деплои встают
# в очередь и каждый доходит до конца.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      # Бэкенд GitHub Pages иногда отдаёт «Deployment failed, try again later» —
      # это не наша ошибка (build и артефакт валидны). Первую попытку не роняем,
      # при транзиентном отказе повторяем в том же прогоне — деплой самолечится.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
